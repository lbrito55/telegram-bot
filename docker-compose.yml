services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      # Override DATABASE_URL to point at the db service inside the compose network.
      DATABASE_URL: postgres://mastra:mastra@db:5432/mastra
    ports:
      - "4111:4111"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mastra
      POSTGRES_PASSWORD: mastra
      POSTGRES_DB: mastra
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mastra -d mastra"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
